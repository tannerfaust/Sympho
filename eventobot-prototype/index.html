<script type="text/babel" data-presets="react-classic">
const { useState, useMemo, useRef, useEffect } = React;

const CITIES = ['Все города','Haifa','Tel Aviv','Hamburg','Leipzig','Karlsruhe','Gütersloh','Poznań','Barcelona','Alicante','Riga'];

// dd.mm.yy → today = 24.06.26 (ср). Ближайшая суббота = 27.06.26
const E = (o)=>o;
const EVENTS = [
  E({id:'aerosmith', title:'Aerosmith', cat:'concert', city:'Haifa', venue:'Romema Arena', date:'04.07.26', time:'20:00', cur:'€', from:13, to:560, soldout:true, seated:true, kids:false, tag:'Super price',

const dateLabel = (e)=> e.dateTo ? `${e.date} – ${e.dateTo}` : e.date;
// «27.06.26» → день недели
const dow = (d)=>{ if(!d) return null; const [dd,mm,yy]=d.split('.').map(Number); const dt=new Date(2000+yy,mm-1,dd); return dt.getDay(); };
const isWeekend = (e)=>{ const g=dow(e.date); return g===6||g===0; };

      {e.soldout && <span className="absolute top-2 right-2 text-[11px] font-bold text-white bg-black/70 px-2 py-0.5 rounded-full">SOLD OUT</span>}
      <div className="absolute bottom-2 left-2 right-2 text-white font-bold drop-shadow text-[14px] leading-tight clamp2">{e.title}</div>

}

}

function CalIcon({className='w-3.5 h-3.5'}){return(
  <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>);}

          <div className="flex items-center gap-1.5"><CalIcon/> {dateLabel(e)} · {e.time}</div>

}

          <span className="flex items-center gap-1 px-2 py-1 rounded border border-slate-200">RU<svg className="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m6 9 6 6 6-6"/></svg></span>

/* ====== ГЕРОЙ + AI-SMART SEARCH (форма: enriched поиск) ====== */
const SLIDES = [
  'https://demo.eventobot.net/sbadmin/storage/slider/06/23/02/03/1920_539_693932800a40b.jpg',
  'https://demo.eventobot.net/sbadmin/storage/slider/00/28/21/18/1920_539_69e0a4b83eaef.jpg',
  'https://demo.eventobot.net/sbadmin/storage/slider/15/11/09/06/1920_539_69b1553a777f3.jpg',
];
function Hero({onSearch, focus}){

    <div className="relative">

        ))}
        <div className="absolute inset-0 bg-gradient-to-t from-black/55 via-black/10 to-transparent"/>

        </div>

function SmartSearch({onSearch, autofocus}){
  const [q,setQ]=useState('');
  const ref=useRef();
  useEffect(()=>{ if(autofocus&&ref.current){ref.current.focus(); ref.current.scrollIntoView({block:'center'});} },[autofocus]);
  const samples=['с ребёнком в Хайфе в субботу до 40 €','Aerosmith','семейное шоу на выходных'];
  return (
    <div className="bg-white rounded-2xl shadow-lift border border-slate-200 p-2 md:p-2.5">
      <div className="flex items-center gap-2">
        <div className="pl-2 text-slate-400"><svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></div>
        <input ref={ref} value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&q.trim())onSearch(q.trim())}}
          placeholder="Поиск событий — обычный или живым языком…"
          className="flex-1 text-[14px] outline-none py-2"/>
        <AIBadge label="AI поиск" className="mr-1 hidden sm:inline-flex"/>
        <button onClick={()=>q.trim()&&onSearch(q.trim())} className="text-[13px] font-bold text-white bg-evb hover:bg-evb-600 rounded-xl px-5 py-2.5">Найти</button>
      </div>
      <div className="flex gap-2 mt-1.5 px-1 pb-0.5 flex-wrap">
        <span className="text-[11px] text-slate-400 py-1">Примеры:</span>
        {samples.map(s=><button key={s} onClick={()=>{setQ(s);onSearch(s);}} className="text-[12px] text-slate-600 border border-slate-200 rounded-full px-2.5 py-1 hover:border-evb hover:text-evb">{s}</button>)}
      </div>
    </div>
  );
}

/* Разбор живого запроса → подтверждение фильтров + результаты */
function parseQuery(text){
  const t=text.toLowerCase();
  const natural=/ребен|ребён|дет|семей|субб|воскрес|выход|до \d|деше|вечер|сегодня/i.test(t);
  if(!natural){
    const list=EVENTS.filter(e=>e.title.toLowerCase().includes(t)||CATS[e.cat].label.toLowerCase().includes(t)||e.city.toLowerCase().includes(t));
    return {natural:false, list, q:text};
  }
  const f={};
  if(/ребен|ребён|дет|семей/.test(t)) f.kids=true;
  const cityHit=CITIES.find(c=>c!=='Все города'&&(t.includes(c.toLowerCase())||(c==='Haifa'&&t.includes('хайф'))||(c==='Tel Aviv'&&t.includes('тель'))));
  if(cityHit) f.city=cityHit;
  if(/субб|воскрес|выход/.test(t)) f.weekend=true;
  const m=t.match(/до\s*(\d+)/); if(m) f.max=Number(m[1]);
  let list=EVENTS.filter(e=>(!f.kids||e.kids)&&(!f.city||e.city===f.city)&&(!f.weekend||isWeekend(e))&&(f.max==null||e.from<=f.max));
  return {natural:true, list, f, q:text};
}

/* ============================================================
   ВИДЖЕТ CONCIERGE — плавающий чат (форма: corner widget)
   ============================================================ */
function ConciergeWidget({mobile, open, setOpen, onOpenEvent}){
  const [msgs,setMsgs]=useState([{role:'ai',text:'Здравствуйте! Помогу выбрать событие или подскажу по возврату и оплате. Что ищете?'}]);
  const [stage,setStage]=useState('idle');
  const [typing,setTyping]=useState(false);
  const bodyRef=useRef();
  useEffect(()=>{if(bodyRef.current)bodyRef.current.scrollTop=bodyRef.current.scrollHeight;},[msgs,typing]);
  const push=m=>setMsgs(x=>[...x,m]);
  const ai=fn=>{setTyping(true);setTimeout(()=>{setTyping(false);fn();},650);};

  const send=(text)=>{
    push({role:'user',text});
    if(/верн|возврат|сдать|обмен/i.test(text)){
      ai(()=>push({role:'ai',text:'Возврат — не позднее чем за 48 часов до события, через личный кабинет → «Мои билеты». Сервисный сбор не возвращается, деньги приходят за 5–7 дней.',src:'из правил кассы Demo Eventobot'}));return;
    }
    if(/оплат|карт|рассроч|pay/i.test(text)){
      ai(()=>push({role:'ai',text:'Принимаем Visa/Mastercard и Apple Pay. Оплата в валюте события (€ или £). Билет приходит на e-mail сразу после оплаты.',src:'из правил кассы'}));return;
    }
    if(stage==='idle' && /ребен|ребён|дет|семей/i.test(text)){
      setStage('ask');
      ai(()=>push({role:'ai',text:'Уточню одно: возраст ребёнка — до 6 или постарше? Это поможет отобрать подходящее.',chips:['До 6 лет','6–12 лет']}));return;
    }
    if(stage==='ask'){
      setStage('done');
      const list=EVENTS.filter(e=>e.kids&&(e.city==='Haifa'||e.city==='Tel Aviv')).slice(0,3);
      ai(()=>push({role:'ai',text:'Вот что подойдёт для ребёнка на ближайшие выходные:',cards:list,
        whys:{safronov:'Дневной сеанс, иллюзия — детям от 5',usachev:'Спокойный формат, автограф-сессия',test2:'Выставка по сеансам, можно с коляской'}}));return;
    }
    ai(()=>push({role:'ai',text:'Не уверен, что понял точно — могу соединить с кассой, ответят за пару минут.',action:'contact'}));
  };

  const Body=(
    <>
      <div ref={bodyRef} className="flex-1 overflow-y-auto px-3.5 py-3 space-y-3 no-sb">
        {msgs.map((m,i)=>(
          <div key={i} className={`fade ${m.role==='user'?'flex justify-end':''}`}>
            {m.role==='user'
              ? <div className="max-w-[80%] bg-evb text-white text-[13px] rounded-2xl rounded-br-md px-3 py-2">{m.text}</div>
              : <div className="max-w-[90%]">
                  <div className="bg-white border border-slate-200 text-[13px] rounded-2xl rounded-bl-md px-3 py-2 text-slate-700">{m.text}
                    {m.src && <div className="mt-1 text-[11px] text-slate-400">Источник: {m.src}</div>}</div>

                  {m.cards && <div className="grid gap-2 mt-2">{m.cards.map(e=><MiniCard key={e.id} e={e} why={m.whys?.[e.id]} onOpen={onOpenEvent}/>)}</div>}

        <ChatInput onSend={send}/>

  return (
    <>
      {!open &&
        <button onClick={()=>setOpen(true)}
          className="fixed z-40 bottom-5 right-5 flex items-center gap-2 bg-ink text-white text-[13px] font-semibold pl-3 pr-4 py-3 rounded-full shadow-lift hover:bg-black transition">

  );
}

/* ============================================================

function EventQA({e}){
  const QA={
    'Во сколько двери?':{a:`Двери открываются за 45 минут до начала. Старт в ${e.time}. Рекомендуем прийти заранее — вход по сканированию билета.`,src:'из расписания события'},

      ? {a:'Да, событие подходит для детей. Дети до 3 лет — без отдельного места на руках у родителя.',src:'из правил площадки'}
      : {a:'Событие рассчитано на взрослую аудиторию (16+). С маленькими детьми вход не предусмотрен.',src:'из правил площадки'},
    'Есть парковка?':{a:`Рядом с «${e.venue}» есть платная городская парковка (~3 ${e.cur}/час). Ближайшая остановка транспорта — в 5 минутах пешком.`,src:'из правил площадки'},
    'Возврат билета':{a:'Возврат возможен не позднее 48 часов до события через личный кабинет. Сервисный сбор не возвращается.',src:'из правил кассы'},

  const [asked,setAsked]=useState([]);

  const ask=qq=>{ if(asked.find(x=>x.q===qq))return; setTyping(true); setTimeout(()=>{setTyping(false);setAsked(a=>[...a,{q:qq,...QA[qq]}]);},550); };
  return (
    <div className="mt-4 border border-slate-200 rounded-2xl bg-white p-4">

        <div className="text-[14px] font-bold">Вопрос о событии?</div>

      <div className="text-[12px] text-slate-400 mt-0.5 mb-3">Быстрый ответ из правил площадки и кассы — встроено прямо в страницу</div>
      <div className="flex gap-2 flex-wrap">
        {Object.keys(QA).map(qq=><button key={qq} onClick={()=>ask(qq)} className="text-[12px] border border-slate-200 rounded-full px-3 py-1.5 hover:border-evb hover:bg-evb-50/50">{qq}</button>)}
      </div>
      <div className="mt-3 space-y-2">
        {asked.map((x,i)=>(
          <div key={i} className="fade bg-slate-50 rounded-xl p-3">
            <div className="text-[13px] font-semibold text-slate-700">{x.q}</div>
            <div className="text-[13px] text-slate-600 mt-0.5">{x.a}</div>
            <div className="text-[11px] text-slate-400 mt-1">Источник: {x.src}</div>
          </div>
        ))}
        {typing && <div className="typing bg-slate-50 inline-flex rounded-xl px-3 py-2.5"><span></span><span></span><span></span></div>}
      </div>
      <div className="mt-3 pt-3 border-t border-slate-100">
        <ChatInput onSend={t=>setAsked(a=>[...a,{q:t,a:'Передал вопрос кассе — ответ придёт сюда и на e-mail в течение нескольких минут.',src:'касса Demo Eventobot'}])}/>
      </div>
    </div>
  );
}

/* ============================================================
   SEAT ADVISOR — интегрированное ИИ-окно (модалка) на странице
   ============================================================ */
function SeatAdvisorModal({e, mobile, onClose}){
  const rows='ABCDEFGH'.split('');
  const cols=12;
  const rowPrice=r=>({A:e.to,B:e.to,C:Math.round(e.to*0.7),D:Math.round(e.to*0.7),E:Math.round((e.from+e.to)/2),F:Math.round((e.from+e.to)/2),G:e.from,H:e.from}[r]);
  const taken=useMemo(()=>new Set(['A3','A4','B7','B8','C1','C2','C5','C6','D9','D10','E6','F11','G4','H8','H9']),[]);
  const [n,setN]=useState(4);
  const [maxP,setMaxP]=useState(rowPrice('C'));
  const [picked,setPicked]=useState(null);
  const find=()=>{
    for(const r of rows){ if(rowPrice(r)>maxP)continue;
      for(let c=1;c<=cols-n+1;c++){ const seats=Array.from({length:n},(_,i)=>`${r}${c+i}`);
        if(seats.every(s=>!taken.has(s))){setPicked({seats:new Set(seats),row:r,price:rowPrice(r)});return;} } }
    setPicked({seats:new Set(),row:null});
  };
  const prices=[...new Set(rows.map(rowPrice))].sort((a,b)=>a-b);
  return (
    <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center p-0 md:p-6">
      <div className="absolute inset-0 bg-black/40" onClick={onClose}/>
      <div className={`relative bg-white w-full md:max-w-2xl ${mobile?'sheet rounded-t-2xl max-h-[88%]':'pop rounded-2xl'} overflow-y-auto shadow-lift`}>
        <div className="sticky top-0 bg-white border-b border-slate-100 px-4 py-3 flex items-center gap-2 z-10">
          <span className="font-bold text-[15px]">Подбор мест</span><AIBadge/>
          <span className="text-[12px] text-slate-400 hidden sm:inline">· {e.title}</span>
          <button onClick={onClose} className="ml-auto text-slate-400 text-[22px] leading-none">×</button>
        </div>
        <div className="p-4">
          <div className="bg-slate-50 border border-slate-200 rounded-xl p-3 mb-3 flex flex-wrap items-center gap-2">
            <span className="text-[13px] text-slate-500">Найти</span>
            <select value={n} onChange={ev=>setN(+ev.target.value)} className="text-[13px] border border-slate-200 rounded-lg px-2 py-1.5 bg-white">{[2,3,4,5,6].map(x=><option key={x} value={x}>{x} места рядом</option>)}</select>
            <span className="text-[13px] text-slate-500">до</span>
            <select value={maxP} onChange={ev=>setMaxP(+ev.target.value)} className="text-[13px] border border-slate-200 rounded-lg px-2 py-1.5 bg-white">{prices.map(x=><option key={x} value={x}>{e.cur}{x} / место</option>)}</select>
            <button onClick={find} className="text-[13px] font-bold text-white bg-evb hover:bg-evb-600 rounded-lg px-4 py-1.5">Подобрать</button>
          </div>
          <div className="bg-gradient-to-b from-slate-100 to-white rounded-xl border border-slate-200 p-4 overflow-x-auto">
            <div className="mx-auto w-fit">
              <div className="text-center text-[11px] tracking-[.3em] text-slate-400 bg-slate-200/70 rounded py-1 mb-4">СЦЕНА</div>
              <div className="space-y-1.5">
                {rows.map(r=>(
                  <div key={r} className="flex items-center gap-1.5 justify-center">
                    <span className="w-4 text-[11px] text-slate-400">{r}</span>
                    {Array.from({length:cols},(_,i)=>{const id=`${r}${i+1}`,tk=taken.has(id),pk=picked?.seats.has(id);
                      let cls=tk?'bg-slate-300/60':'bg-emerald-200'; if(pk)cls='bg-evb ring-2 ring-evb-100';
                      return <div key={id} title={`${id} · ${e.cur}${rowPrice(r)}`} className={`w-5 h-5 rounded-[5px] ${cls} ${pk?'scale-110':''} transition-all`}/>;})}
                    <span className="w-9 text-[10px] text-slate-400 text-right">{e.cur}{rowPrice(r)}</span>
                  </div>
                ))}
              </div>
              <div className="flex items-center gap-4 justify-center mt-4 text-[11px] text-slate-500">
                <span className="flex items-center gap-1"><i className="w-3 h-3 rounded bg-emerald-200 inline-block"/>свободно</span>
                <span className="flex items-center gap-1"><i className="w-3 h-3 rounded bg-slate-300/60 inline-block"/>занято</span>
                <span className="flex items-center gap-1"><i className="w-3 h-3 rounded bg-evb inline-block"/>подобрано AI</span>
              </div>
            </div>
          </div>
          {picked && picked.row && (
            <div className="fade mt-3 bg-evb-50 border border-evb-100 rounded-xl p-3 flex flex-wrap items-center gap-3">
              <div>
                <div className="text-[13px] font-bold">Ряд {picked.row}, места {[...picked.seats].map(s=>s.slice(1)).join(', ')}</div>
                <div className="text-[12px] text-slate-500">{n} мест рядом · {e.cur}{picked.price}/место · итого {e.cur}{picked.price*n}</div>
              </div>
              <button className="ml-auto text-[13px] font-bold text-white bg-evb hover:bg-evb-600 rounded-lg px-5 py-2">Забронировать эти</button>
            </div>
          )}
          {picked && !picked.row && <div className="fade mt-3 bg-amber-50 border border-amber-200 text-amber-800 text-[13px] rounded-xl px-4 py-3">Не нашлось {n} мест рядом до {e.cur}{maxP}. Увеличьте бюджет или уменьшите число мест.</div>}
        </div>
      </div>
    </div>
  );
}

          <div className="text-[13px] text-slate-600 mb-2">Сообщим первым, как только билеты появятся:</div>

      </div>
    </div>
  );
}

        <label className="ml-auto flex items-center gap-2 text-[12px] text-slate-300">
          <span className="hidden sm:inline">Mobile</span>
          <button onClick={()=>setMobile(m=>!m)} className={`w-9 h-5 rounded-full relative transition ${mobile?'bg-evb':'bg-white/20'}`}><span className={`absolute top-0.5 w-4 h-4 bg-white rounded-full transition-all ${mobile?'left-[18px]':'left-0.5'}`}/></button>
        </label>
      </div>
    </div>
  );
}

/* демо-подсказка «что это» для активной фичи */
function FormHint({id}){
  const it=AI_ITEMS.find(x=>x.id===id); if(!it)return null;
  return <div className="max-w-[1200px] mx-auto px-4"><div className="mt-3 text-[12px] text-slate-500 bg-white border border-slate-200 rounded-lg px-3 py-2 flex items-center gap-2 fade"><AIBadge/><span className="font-semibold text-slate-700">{it.name}</span> — форма интеграции: {it.form}. Помечено бейджем AI прямо в интерфейсе.</div></div>;
}

/* ============================================================
   APP
   ============================================================ */
function Home({mobile, onOpenEvent, search, setSearch, focusSearch, hint}){
  const affiche=EVENTS.filter(e=>e.tag).slice(0,4);
  const list=EVENTS.filter(e=>!e.soldout);
  const soon=EVENTS.filter(e=>e.dateTo);
  const res=search?parseQuery(search):null;
  return (
    <>
      <Hero onSearch={setSearch} focus={focusSearch}/>
      {hint && <FormHint id={hint}/>}
      {res ? (
        <Section title="Результаты поиска" sub={`Запрос: «${res.q}»`}>
          {res.natural && res.f && (
            <div className="mb-4 bg-evb-50 border border-evb-100 rounded-xl px-4 py-3 fade flex flex-wrap items-center gap-2">
              <AIBadge/>
              <span className="text-[13px] text-deep"><b>Ищу:</b> {res.f.kids?'детские/семейные события, ':''}{res.f.city?res.f.city+', ':''}{res.f.weekend?'выходные, ':''}{res.f.max?`до ${EVENTS[0].cur}${res.f.max}`:''}. <span className="text-evb">Верно?</span></span>
              <div className="ml-auto flex gap-2"><button className="text-[12px] font-bold text-white bg-evb rounded-lg px-3 py-1">Да</button><button onClick={()=>setSearch('')} className="text-[12px] text-evb border border-evb-100 rounded-lg px-3 py-1">Сброс</button></div>
            </div>
          )}
          <div className="text-[12px] text-slate-400 mb-3">{res.list.length} событ{res.list.length===1?'ие':'ий'}{!res.natural&&' · обычный поиск'}</div>
          <div className={`grid gap-4 ${mobile?'grid-cols-1':'grid-cols-2 md:grid-cols-4'}`}>{res.list.map(e=><EventCard key={e.id} e={e} onOpen={onOpenEvent}/>)}</div>
          {res.list.length===0 && <div className="text-[13px] text-slate-400 py-8 text-center">Ничего не нашли. Попробуйте другой запрос.</div>}
        </Section>
      ) : (
        <>
          {/* фильтр городов */}
          <div className="max-w-[1200px] mx-auto px-4 mt-6">
            <div className="flex gap-2 overflow-x-auto no-sb pb-1">
              {CITIES.map((c,i)=><button key={c} className={`text-[12px] whitespace-nowrap px-3 py-1.5 rounded-full border ${i===0?'bg-ink text-white border-ink':'bg-white text-slate-600 border-slate-200 hover:border-evb'}`}>{c}</button>)}
            </div>
          </div>
          <Section title="Affiche" sub="Рекомендуемое">
            <div className={`grid gap-4 ${mobile?'grid-cols-1':'grid-cols-2 md:grid-cols-4'}`}>{affiche.map(e=><EventCard key={e.id} e={e} onOpen={onOpenEvent}/>)}</div>
          </Section>
          <Section title="Events list">
            <div className={`grid gap-4 ${mobile?'grid-cols-1':'grid-cols-2 md:grid-cols-4'}`}>{list.map(e=><EventCard key={e.id} e={e} onOpen={onOpenEvent}/>)}</div>
          </Section>
          <Section title="Soon" sub="Скоро в продаже / длительные показы">
            <div className={`grid gap-4 ${mobile?'grid-cols-1':'grid-cols-2 md:grid-cols-4'}`}>{soon.map(e=><EventCard key={e.id} e={e} onOpen={onOpenEvent}/>)}</div>
          </Section>
        </>
      )}
    </>
  );
}

function App(){
  const [mobile,setMobile]=useState(false);
  const [view,setView]=useState({type:'home'});
  const [search,setSearch]=useState('');
  const [chat,setChat]=useState(false);
  const [hint,setHint]=useState(null);
  const [focusSearch,setFocusSearch]=useState(0);
  const scroller=useRef();

  const openEvent=e=>{ setView({type:'event',id:e.id}); setHint(null); if(scroller.current)scroller.current.scrollTop=0; };
  const goHome=()=>{ setView({type:'home'}); setSearch(''); };

  // навигация по AI-продуктам из верхней панели
  const go=(id)=>{
    setHint(id);
    if(id==='concierge'){ setChat(true); }
    else if(id==='search'){ setView({type:'home'}); setSearch(''); setChat(false); setFocusSearch(x=>x+1); }
    else if(id==='qa'){ setChat(false); setView({type:'event',id:'fridman'}); }
    else if(id==='seats'){ setChat(false); setView({type:'event',id:'fridman',openSeat:true}); }
    else if(id==='demand'){ setChat(false); setView({type:'event',id:'aerosmith'}); }
    if(scroller.current)scroller.current.scrollTop=0;
  };

  const ev=view.type==='event'?byId(view.id):null;

  // авто-открытие Seat Advisor при переходе из панели
  const detailKey = view.type==='event'?view.id+(view.openSeat?'-seat':''):'home';

  const frame=(content)=>(
    <div className={mobile?'mx-auto':'w-full'} style={mobile?{maxWidth:430}:{}}>{content}</div>
  );

  return (
    <div className="min-h-screen">
      <ProtoRail active={hint} go={go} mobile={mobile} setMobile={setMobile}/>
      <div ref={scroller} className={`bg-[#f3f4f6] ${mobile?'border-x border-slate-300 max-w-[440px] mx-auto min-h-screen relative overflow-x-hidden':'relative'}`}>
        <StoreHeader mobile={mobile} onHome={goHome}/>
        <div key={view.type==='home'?'home'+(search?'-s':''):detailKey} className="fade">
          {view.type==='home'
            ? <Home mobile={mobile} onOpenEvent={openEvent} search={search} setSearch={(s)=>{setSearch(s);setView({type:'home'});}} focusSearch={focusSearch} hint={['search','concierge'].includes(hint)?hint:null}/>
            : <EventWithSeat e={ev} mobile={mobile} onBack={goHome} onOpenEvent={openEvent} openSeat={view.openSeat} hint={hint}/>}
        </div>
        <Footer/>
        <ConciergeWidget mobile={mobile} open={chat} setOpen={setChat} onOpenEvent={openEvent}/>
      </div>
    </div>
  );
}

// Обёртка, чтобы авто-открыть Seat Advisor по приходу из панели
function EventWithSeat({e, mobile, onBack, onOpenEvent, openSeat, hint}){
  const [seat,setSeat]=useState(false);
  useEffect(()=>{ if(openSeat&&e.seated&&!e.soldout)setSeat(true); },[openSeat,e]);
  return (
    <>
      {['qa','seats','demand'].includes(hint) && <FormHint id={hint}/>}
      <EventDetailInner e={e} mobile={mobile} onBack={onBack} onOpenEvent={onOpenEvent} seat={seat} setSeat={setSeat}/>
    </>
  );
}
function EventDetailInner({e, mobile, onBack, onOpenEvent, seat, setSeat}){
  return (
    <div className="max-w-[1200px] mx-auto px-4 py-6">
      <button onClick={onBack} className="text-[13px] text-slate-500 hover:text-evb flex items-center gap-1 mb-4"><svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m15 18-6-6 6-6"/></svg>Все события</button>
      <div className={mobile?'':'grid grid-cols-2 gap-8'}>
        <div className={mobile?'mb-5':''}><Poster e={e} h="h-72" rounded="rounded-2xl"/></div>
        <div>
          {e.tag && <span className="inline-block mb-2 text-[11px] font-bold uppercase tracking-wide text-evb bg-evb-50 px-2 py-0.5 rounded">{e.tag}</span>}
          <h1 className="text-[24px] font-black leading-tight">{e.title}</h1>
          <div className="mt-2 space-y-1.5 text-[13px] text-slate-600">
            <div className="flex items-center gap-2"><CalIcon className="w-4 h-4 text-evb"/> {dateLabel(e)} · {e.time}</div>
            <div className="flex items-center gap-2"><PinIcon className="w-4 h-4 text-evb"/> {e.city} · {e.venue}</div>
          </div>
          <p className="mt-3 text-[13px] text-slate-500 leading-relaxed">{e.desc}</p>
          <div className="mt-4"><span className="text-[12px] text-slate-400">от </span><span className="text-[22px] font-black">{e.cur}{e.from}</span><span className="text-[12px] text-slate-400"> до {e.cur}{e.to}</span></div>
          {e.soldout
            ? <DemandCatcher e={e} onOpenEvent={onOpenEvent}/>
            : <div className="mt-4 flex flex-wrap gap-2">
                <button className="text-[14px] font-bold text-white bg-evb hover:bg-evb-600 rounded-xl px-6 py-3">Buy ticket</button>
                {e.seated && <button onClick={()=>setSeat(true)} className="text-[14px] font-bold text-ink bg-white border-2 border-ink hover:bg-slate-50 rounded-xl px-5 py-3 flex items-center gap-2">Подобрать места <AIBadge/></button>}
              </div>}
          <EventQA e={e}/>
        </div>
      </div>
      {seat && <SeatAdvisorModal e={e} mobile={mobile} onClose={()=>setSeat(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
