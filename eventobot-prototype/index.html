<html lang="ru">
<head>
<meta charset="utf-8" />

<title>EventoBot — AI-линейка для билетной витрины</title>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          brand: {
            50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',
            400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',900:'#312e81'

          ink: '#0b0b12',
        },
        fontFamily: {
          sans: ['Inter','-apple-system','BlinkMacSystemFont','Segoe UI','Roboto','sans-serif'],
        },
        boxShadow: {
          soft: '0 1px 2px rgba(16,24,40,.04), 0 8px 24px rgba(16,24,40,.06)',
          lift: '0 12px 40px rgba(16,24,40,.12)',
        }
      }
    }
  }
</script>
<style>
  html,body{background:#f6f7f9;}
  *{-webkit-font-smoothing:antialiased;}
  ::-webkit-scrollbar{height:8px;width:8px}
  ::-webkit-scrollbar-thumb{background:#d8dbe2;border-radius:8px}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .fade{animation:fade .25s ease both}
  @keyframes sheet{from{transform:translateY(100%)}to{transform:none}}
  .sheet{animation:sheet .28s cubic-bezier(.2,.8,.2,1) both}
  @keyframes pulse2{0%,100%{opacity:.4}50%{opacity:1}}
  .typing span{display:inline-block;width:6px;height:6px;border-radius:99px;background:#9aa0ad;margin:0 1px;animation:pulse2 1.1s infinite}
  .typing span:nth-child(2){animation-delay:.18s}
  .typing span:nth-child(3){animation-delay:.36s}
</style>
</head>
<body class="font-sans text-ink">
<div id="root"></div>

<script>
  // preset-react defaults to the automatic JSX runtime (emits `import "react/jsx-runtime"`),
  // which breaks with UMD React globals. Register a classic-runtime variant instead.
  Babel.registerPreset('react-classic', {
    presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]]
  });
</script>
<script type="text/babel" data-presets="react-classic">
const { useState, useMemo, useRef, useEffect } = React;

/* ============================================================
   ОБЩИЙ ДАТАСЕТ СОБЫТИЙ — переиспользуется во всех продуктах
   ============================================================ */
const GENRES = {
  concert:   { label:'Концерт',     grad:'from-indigo-500 to-violet-600' },
  standup:   { label:'Стендап',     grad:'from-amber-500 to-orange-600' },
  kids:      { label:'Детское',     grad:'from-sky-400 to-cyan-500' },
  immersive: { label:'Иммерсив',    grad:'from-fuchsia-500 to-pink-600' },
  exhibition:{ label:'Выставка',    grad:'from-emerald-500 to-teal-600' },
};

const EVENTS = [
  { id:'e1',  title:'Симфония Hans Zimmer Live', genre:'concert',   city:'Берлин',    venue:'Mercedes-Benz Arena', date:'2026-06-20', time:'20:00', price:45, kids:true,  tags:['weekend'],            note:'Семейный блок, удобно с детьми от 6 лет' },
  { id:'e2',  title:'Детское шоу «Космо-театр»',  genre:'kids',      city:'Берлин',    venue:'FEZ Berlin',          date:'2026-06-21', time:'12:00', price:18, kids:true,  tags:['weekend','cheap'],    note:'Дневной сеанс, мест много' },
  { id:'e3',  title:'Иммерсив «Тайна особняка»',   genre:'immersive', city:'Берлин',    venue:'Alte Münze',          date:'2026-06-20', time:'19:30', price:39, kids:false, tags:['weekend','last'],     note:'Осталось <20 билетов' },
  { id:'e4',  title:'Stand-up: Берлинский квартет',genre:'standup',   city:'Берлин',    venue:'Comedy Café',         date:'2026-06-27', time:'21:00', price:24, kids:false, tags:[],                     note:'18+' },
  { id:'e5',  title:'Aerosmith — Farewell Tour',  genre:'concert',   city:'Гамбург',   venue:'Barclays Arena',      date:'2026-07-04', time:'20:00', price:79, kids:false, tags:['soldout'],            note:'Sold out' },
  { id:'e6',  title:'Выставка «Свет и цвет»',      genre:'exhibition',city:'Гамбург',   venue:'Deichtorhallen',      date:'2026-06-20', time:'10:00', price:14, kids:true,  tags:['weekend','cheap'],    note:'Вход по сеансам' },
  { id:'e7',  title:'Детский мюзикл «Пингвины»',   genre:'kids',      city:'Тель-Авив', venue:'Charles Bronfman',    date:'2026-06-26', time:'17:00', price:22, kids:true,  tags:[],                     note:'На иврите и английском' },
  { id:'e8',  title:'Jazz Night в порту',          genre:'concert',   city:'Тель-Авив', venue:'Reading Hall',        date:'2026-06-20', time:'21:30', price:33, kids:false, tags:['weekend'],            note:'Хайфа в 1 ч езды' },
  { id:'e9',  title:'Stand-up по-латышски',        genre:'standup',   city:'Рига',      venue:'Splendid Palace',     date:'2026-06-28', time:'20:00', price:19, kids:false, tags:['cheap'],              note:'16+' },
  { id:'e10', title:'Орган в Домском соборе',      genre:'concert',   city:'Рига',      venue:'Dome Cathedral',      date:'2026-06-21', time:'18:00', price:16, kids:true,  tags:['weekend','cheap'],    note:'Спокойный формат' },
  { id:'e11', title:'Иммерсив «Город огней»',      genre:'immersive', city:'Вильнюс',   venue:'Loftas',              date:'2026-06-27', time:'20:00', price:29, kids:false, tags:['last'],               note:'Последние билеты' },
  { id:'e12', title:'Фламенко-гала',               genre:'concert',   city:'Мадрид',    venue:'Teatro Real',         date:'2026-06-20', time:'20:30', price:52, kids:false, tags:['weekend'],            note:'Премьерный состав' },
];

const fmtDate = (iso) => {
  const d = new Date(iso+'T00:00');
  const days=['вс','пн','вт','ср','чт','пт','сб'];
  return `${days[d.getDay()]}, ${d.getDate()} ${['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'][d.getMonth()]}`;
};
const isWeekend = (iso)=>{const d=new Date(iso+'T00:00').getDay();return d===6||d===0;};

/* ============================================================
   БАЗОВЫЕ UI-ЭЛЕМЕНТЫ
   ============================================================ */
function Poster({ev, h='h-36'}){
  const g = GENRES[ev.genre];
  return (
    <div className={`relative ${h} rounded-xl overflow-hidden bg-gradient-to-br ${g.grad}`}>
      <div className="absolute inset-0 opacity-20"
        style={{backgroundImage:'radial-gradient(circle at 20% 20%, white 0, transparent 40%), radial-gradient(circle at 80% 60%, white 0, transparent 35%)'}}/>
      <div className="absolute top-2 left-2 text-[11px] font-medium text-white/90 bg-black/20 backdrop-blur px-2 py-0.5 rounded-full">{g.label}</div>
      {ev.tags.includes('soldout') &&
        <div className="absolute top-2 right-2 text-[11px] font-semibold text-white bg-rose-600 px-2 py-0.5 rounded-full">Sold out</div>}
      {ev.tags.includes('last') &&
        <div className="absolute top-2 right-2 text-[11px] font-semibold text-white bg-amber-500 px-2 py-0.5 rounded-full">Последние</div>}
      <div className="absolute bottom-2 left-2 right-2 text-white drop-shadow text-[13px] font-semibold leading-tight">{ev.title}</div>
    </div>
  );
}

function EventCard({ev, why, compact}){
  const soldout = ev.tags.includes('soldout');
  return (
    <div className="bg-white rounded-2xl border border-slate-200/70 shadow-soft overflow-hidden hover:shadow-lift transition-shadow">
      <Poster ev={ev} h={compact?'h-24':'h-32'} />
      <div className="p-3">
        <div className="text-[13px] font-semibold leading-snug line-clamp-2">{ev.title}</div>
        <div className="mt-1 text-[12px] text-slate-500">{ev.city} · {ev.venue}</div>
        <div className="text-[12px] text-slate-500">{fmtDate(ev.date)} · {ev.time}</div>
        {why && <div className="mt-2 text-[12px] text-brand-700 bg-brand-50 rounded-lg px-2 py-1.5 leading-snug">{why}</div>}
        <div className="mt-3 flex items-center justify-between">
          <div className="text-[13px]"><span className="text-slate-400 text-[11px]">от </span><span className="font-bold">€{ev.price}</span></div>
          {soldout
            ? <button className="text-[12px] font-medium text-slate-500 bg-slate-100 px-3 py-1.5 rounded-lg cursor-not-allowed">Нет мест</button>
            : <button className="text-[12px] font-semibold text-white bg-brand-600 hover:bg-brand-700 px-3 py-1.5 rounded-lg transition-colors">Купить</button>}
        </div>
      </div>
    </div>
  );
}

function Tag({children, tone='slate'}){
  const t={slate:'bg-slate-100 text-slate-600',brand:'bg-brand-50 text-brand-700',green:'bg-emerald-50 text-emerald-700',amber:'bg-amber-50 text-amber-700',rose:'bg-rose-50 text-rose-700'}[tone];
  return <span className={`text-[11px] font-medium px-2 py-0.5 rounded-full ${t}`}>{children}</span>;
}

function SurfaceBadge({surface}){
  const map={
    buyer:{t:'Витрина покупателя',c:'bg-brand-50 text-brand-700 border-brand-200'},
    admin:{t:'Админка кассы',c:'bg-emerald-50 text-emerald-700 border-emerald-200'},
    strat:{t:'Стратегический мок',c:'bg-amber-50 text-amber-700 border-amber-200'},
  }[surface];
  return <span className={`text-[11px] font-semibold px-2.5 py-1 rounded-full border ${map.c}`}>{map.t}</span>;
}

/* Рамка «макет витрины» — общий хром клиентской кассы CityTickets */
function StoreChrome({children, city='Берлин'}){
  return (
    <div className="rounded-2xl border border-slate-200 bg-white shadow-soft overflow-hidden">
      <div className="h-11 flex items-center gap-3 px-4 border-b border-slate-100 bg-white">
        <div className="flex items-center gap-2">
          <div className="w-6 h-6 rounded-lg bg-ink text-white grid place-items-center text-[12px] font-black">C</div>
          <span className="font-bold tracking-tight text-[15px]">CityTickets</span>
        </div>
        <div className="hidden md:flex items-center gap-4 text-[13px] text-slate-500 ml-2">
          <span>Концерты</span><span>Дети</span><span>Стендап</span><span>Выставки</span>
        </div>
        <div className="ml-auto flex items-center gap-3 text-[13px] text-slate-500">
          <span className="hidden sm:inline">{city}</span>
          <span className="hidden sm:inline">RU · €</span>
          <div className="w-7 h-7 rounded-full bg-slate-100 grid place-items-center text-[12px] font-medium">U</div>
        </div>
      </div>
      <div className="bg-slate-50/60">{children}</div>
    </div>
  );
}

function AdminChrome({children, title}){
  return (
    <div className="rounded-2xl border border-slate-200 bg-white shadow-soft overflow-hidden">
      <div className="h-11 flex items-center gap-3 px-4 border-b border-slate-100">
        <div className="w-6 h-6 rounded-lg bg-emerald-600 text-white grid place-items-center text-[12px] font-black">C</div>
        <span className="font-bold text-[14px]">CityTickets <span className="text-slate-400 font-medium">/ Админка</span></span>
        <span className="ml-2 text-[13px] text-slate-500">{title}</span>
        <div className="ml-auto text-[13px] text-slate-400">Организатор · Берлин</div>
      </div>
      <div className="bg-slate-50/60">{children}</div>
    </div>
  );
}

function Section({title, sub, children}){
  return (
    <div>
      <div className="mb-3">
        <div className="text-[13px] font-semibold text-slate-700">{title}</div>
        {sub && <div className="text-[12px] text-slate-400">{sub}</div>}
      </div>
      {children}
    </div>
  );
}

/* Универсальная подсказка «что это» */
function WhatIs({children}){
  return <p className="text-[13px] text-slate-500 leading-relaxed">{children}</p>;
}

/* ============================================================
   1. AI CONCIERGE — чат в углу витрины / bottom sheet
   ============================================================ */
function ConciergeChat({onClose, mobile}){
  const [msgs,setMsgs]=useState([
    {role:'ai',text:'Здравствуйте! Помогу выбрать событие или подскажу по возврату. Что ищете?'}
  ]);
  const [stage,setStage]=useState('idle');
  const [typing,setTyping]=useState(false);
  const bodyRef=useRef();
  useEffect(()=>{ if(bodyRef.current) bodyRef.current.scrollTop=bodyRef.current.scrollHeight; },[msgs,typing]);

  const push=(m)=>setMsgs(x=>[...x,m]);
  const aiReply=(fn)=>{setTyping(true);setTimeout(()=>{setTyping(false);fn();},700);};

  const send=(text)=>{
    push({role:'user',text});
    if(/верн|возврат|сдать билет/i.test(text)){
      aiReply(()=>push({role:'ai',text:'Возврат возможен не позднее чем за 48 часов до события. В личном кабинете → «Мои билеты» → «Вернуть». Деньги придут на карту за 5–7 дней.', source:'из правил кассы'}));
      return;
    }
    if(stage==='idle' && /ребен|ребён|дет/i.test(text)){
      setStage('ask');
      aiReply(()=>push({role:'ai',text:'Уточню одно: какой возраст ребёнка — до 6 или постарше? Это поможет отобрать подходящее.',chips:['До 6 лет','6–12 лет']}));
      return;
    }
    if(stage==='ask'){
      setStage('done');
      const list=EVENTS.filter(e=>e.city==='Берлин'&&e.kids&&isWeekend(e.date)).slice(0,3);
      aiReply(()=>push({role:'ai',text:'Вот что подойдёт на выходные в Берлине:',cards:list,
        whys:{e1:'Семейный блок, мягкий звук',e2:'Дневной сеанс, идеально с малышами',e6:'Спокойный темп, можно с коляской'}}));
      return;
    }
    aiReply(()=>push({role:'ai',text:'Не уверен, что понял точно. Могу соединить с кассой — ответят в течение пары минут.',action:'contact'}));
  };

  const Body=(
    <>
      <div ref={bodyRef} className="flex-1 overflow-y-auto px-4 py-3 space-y-3">
        {msgs.map((m,i)=>(
          <div key={i} className={`fade ${m.role==='user'?'flex justify-end':''}`}>
            {m.role==='user'
              ? <div className="max-w-[80%] bg-brand-600 text-white text-[13px] rounded-2xl rounded-br-md px-3 py-2">{m.text}</div>
              : <div className="max-w-[88%]">
                  <div className="bg-white border border-slate-200 text-[13px] rounded-2xl rounded-bl-md px-3 py-2 text-slate-700">{m.text}
                    {m.source && <div className="mt-1 text-[11px] text-slate-400">Источник: {m.source}</div>}
                  </div>
                  {m.chips && <div className="flex gap-2 mt-2 flex-wrap">{m.chips.map(c=>
                    <button key={c} onClick={()=>send(c)} className="text-[12px] border border-slate-300 rounded-full px-3 py-1 hover:bg-slate-50">{c}</button>)}</div>}
                  {m.cards && <div className="grid grid-cols-1 gap-2 mt-2">{m.cards.map(ev=>
                    <EventCard key={ev.id} ev={ev} why={m.whys?.[ev.id]} compact/>)}</div>}
                  {m.action==='contact' && <button className="mt-2 text-[12px] font-semibold text-brand-700 border border-brand-200 bg-brand-50 rounded-lg px-3 py-1.5">Написать в кассу</button>}
                </div>}
          </div>
        ))}
        {typing && <div className="typing bg-white border border-slate-200 inline-flex rounded-2xl rounded-bl-md px-3 py-2.5"><span></span><span></span><span></span></div>}
      </div>
      <div className="p-3 border-t border-slate-100 bg-white">
        {msgs.length<=1 && <div className="flex gap-2 mb-2 flex-wrap">
          {['Хочу с ребёнком в Берлине в выходные','Как вернуть билет?'].map(s=>
            <button key={s} onClick={()=>send(s)} className="text-[12px] text-slate-600 border border-slate-200 rounded-full px-3 py-1 hover:bg-slate-50">{s}</button>)}
        </div>}
        <ChatInput onSend={send}/>
      </div>
    </>
  );

  if(mobile){
    return (
      <div className="absolute inset-0 z-30 flex items-end" >
        <div className="absolute inset-0 bg-black/30" onClick={onClose}/>
        <div className="sheet relative w-full h-[78%] bg-slate-50 rounded-t-2xl flex flex-col shadow-lift">
          <div className="h-12 flex items-center px-4 border-b border-slate-100 bg-white rounded-t-2xl">
            <div className="w-9 h-1 bg-slate-200 rounded-full absolute left-1/2 -translate-x-1/2 top-2"/>
            <span className="font-semibold text-[14px]">Помощник кассы</span>
            <button onClick={onClose} className="ml-auto text-slate-400 text-[20px] leading-none">×</button>
          </div>
          {Body}
        </div>
      </div>
    );
  }
  return (
    <div className="absolute bottom-4 right-4 z-30 w-[360px] h-[520px] bg-slate-50 rounded-2xl shadow-lift border border-slate-200 flex flex-col fade">
      <div className="h-12 flex items-center px-4 border-b border-slate-100 bg-white rounded-t-2xl">
        <span className="font-semibold text-[14px]">Помощник кассы</span>
        <span className="ml-2 text-[11px] text-slate-400">отвечает обычно за минуту</span>
        <button onClick={onClose} className="ml-auto text-slate-400 text-[20px] leading-none hover:text-slate-600">×</button>
      </div>
      {Body}
    </div>
  );
}

function ChatInput({onSend}){
  const [v,setV]=useState('');
  return (
    <form onSubmit={e=>{e.preventDefault();if(v.trim()){onSend(v.trim());setV('');}}} className="flex gap-2">
      <input value={v} onChange={e=>setV(e.target.value)} placeholder="Сообщение…"
        className="flex-1 text-[13px] border border-slate-200 rounded-xl px-3 py-2 outline-none focus:border-brand-400"/>
      <button className="text-[13px] font-semibold text-white bg-brand-600 rounded-xl px-3">Отпр.</button>
    </form>
  );
}

function ProductConcierge({mobile}){
  const [open,setOpen]=useState(false);
  return (
    <div>
      <StoreChrome>
        <div className="relative" style={{minHeight: mobile?540:560}}>
          {/* Фон витрины */}
          <div className="p-4 md:p-6">
            <div className="text-[20px] font-bold tracking-tight mb-1">События в Берлине</div>
            <div className="text-[13px] text-slate-500 mb-4">Концерты, детское, стендап и иммерсивные шоу</div>
            <div className={`grid ${mobile?'grid-cols-1':'grid-cols-3'} gap-3`}>
              {EVENTS.filter(e=>e.city==='Берлин').map(ev=><EventCard key={ev.id} ev={ev}/>)}
            </div>
          </div>
          {/* Кнопка-запуск — ассистент НЕ открывается сам */}
          {!open &&
            <button onClick={()=>setOpen(true)}
              className="absolute bottom-4 right-4 z-20 flex items-center gap-2 bg-ink text-white text-[13px] font-medium pl-3 pr-4 py-2.5 rounded-full shadow-lift hover:bg-black transition">
              <span className="w-2 h-2 rounded-full bg-emerald-400"></span>
              Помощь с выбором
            </button>}
          {open && <ConciergeChat mobile={mobile} onClose={()=>setOpen(false)}/>}
        </div>
      </StoreChrome>
      <p className="mt-3 text-[12px] text-slate-400">Ассистент открывается только по клику. Если не знает ответа — предлагает «написать в кассу», а не выдумывает.</p>
    </div>
  );
}

/* ============================================================
   2. SMART SEARCH — поиск, понимающий живые запросы
   ============================================================ */
function ProductSmartSearch({mobile}){
  const [q,setQ]=useState('');
  const [parsed,setParsed]=useState(null);
  const [results,setResults]=useState(null);

  const run=(text)=>{
    setQ(text);
    const t=text.toLowerCase();
    const isNatural=/субб|воскрес|выход|ребен|ребён|дет|до \d|деше|вечер/i.test(t);
    if(isNatural){
      const filters={genre:/дет|ребен|ребён/.test(t)?'kids':null, city:'Берлин', when:'суббота', max: (t.match(/до (\d+)/)||[])[1]?Number((t.match(/до (\d+)/))[1]):30};
      setParsed(filters);
      let list=EVENTS.filter(e=>e.city===filters.city && (!filters.genre||e.genre===filters.genre) && isWeekend(e.date) && e.price<=filters.max);
      setResults(list);
    } else {
      setParsed(null);
      const list=EVENTS.filter(e=>e.title.toLowerCase().includes(t)||GENRES[e.genre].label.toLowerCase().includes(t)||e.city.toLowerCase().includes(t));
      setResults(list);
    }
  };

  return (
    <div>
      <StoreChrome>
        <div className="p-4 md:p-6">
          <div className="max-w-2xl mx-auto">
            <div className="relative">
              <svg className="absolute left-3 top-3.5 w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
              <input value={q} onChange={e=>setQ(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter'&&q.trim())run(q.trim())}}
                placeholder="Куда сходить с ребёнком в субботу до 30 евро"
                className="w-full text-[14px] bg-white border border-slate-200 rounded-xl pl-9 pr-24 py-3 outline-none focus:border-brand-400 shadow-soft"/>
              <button onClick={()=>q.trim()&&run(q.trim())} className="absolute right-1.5 top-1.5 text-[13px] font-semibold text-white bg-brand-600 hover:bg-brand-700 rounded-lg px-4 py-1.5">Найти</button>
            </div>
            <div className="flex gap-2 mt-2 flex-wrap">
              {['Куда сходить с ребёнком в субботу до 30 евро','Aerosmith','Иммерсив в выходные'].map(s=>

/* ============================================================
   5. SEAT ADVISOR — «4 места рядом до 60 €» → подсветка схемы
   ============================================================ */
function ProductSeatAdvisor({mobile}){
  const rows='ABCDEFGH'.split('');
  const cols=12;
  // цена по рядам
  const rowPrice=(r)=>({A:75,B:75,C:60,D:60,E:45,F:45,G:30,H:30}[r]);
  // случайные занятые
  const taken=useMemo(()=>{
    const s=new Set();['A3','A4','B7','B8','C1','C2','C5','D9','D10','E6','F11','G4','H8','H9','C6','C7'].forEach(x=>s.add(x));
    return s;
  },[]);
  const [n,setN]=useState(4);
  const [maxP,setMaxP]=useState(60);
  const [picked,setPicked]=useState(null);

  const find=()=>{
    // ищем n соседних мест в одном ряду, цена<=maxP, свободные
    for(const r of rows){
      if(rowPrice(r)>maxP)continue;
      for(let c=1;c<=cols-n+1;c++){
        const seats=Array.from({length:n},(_,i)=>`${r}${c+i}`);
        if(seats.every(s=>!taken.has(s))){ setPicked({seats:new Set(seats),row:r,price:rowPrice(r)}); return; }
      }
    }
    setPicked({seats:new Set(),row:null});
  };

  return (
    <div>
      <StoreChrome>
        <div className="p-4 md:p-6">
          <div className="text-[16px] font-bold mb-1">Симфония Hans Zimmer Live · схема зала</div>
          <div className="text-[13px] text-slate-500 mb-4">Mercedes-Benz Arena · Берлин</div>

          <div className="bg-white border border-slate-200 rounded-xl p-3 mb-4 flex flex-wrap items-center gap-3">
            <span className="text-[13px] text-slate-500">Найти</span>
            <select value={n} onChange={e=>setN(+e.target.value)} className="text-[13px] border border-slate-200 rounded-lg px-2 py-1.5">
              {[2,3,4,5,6].map(x=><option key={x} value={x}>{x} места рядом</option>)}
            </select>
            <span className="text-[13px] text-slate-500">до</span>
            <select value={maxP} onChange={e=>setMaxP(+e.target.value)} className="text-[13px] border border-slate-200 rounded-lg px-2 py-1.5">
              {[30,45,60,75].map(x=><option key={x} value={x}>€{x} / место</option>)}
            </select>
            <button onClick={find} className="text-[13px] font-semibold text-white bg-brand-600 hover:bg-brand-700 rounded-lg px-4 py-1.5">Подобрать</button>
            <span className="text-[12px] text-slate-400 ml-auto hidden md:inline">«{n} места рядом до €{maxP}»</span>
          </div>

          {/* Схема */}
          <div className="bg-gradient-to-b from-slate-100 to-white rounded-2xl border border-slate-200 p-4 overflow-x-auto">
            <div className="mx-auto w-fit">
              <div className="text-center text-[11px] tracking-[.3em] text-slate-400 bg-slate-200/70 rounded-md py-1 mb-4">СЦЕНА</div>
              <div className="space-y-1.5">
                {rows.map(r=>(
                  <div key={r} className="flex items-center gap-1.5 justify-center">
                    <span className="w-4 text-[11px] text-slate-400">{r}</span>
                    {Array.from({length:cols},(_,i)=>{
                      const id=`${r}${i+1}`;
                      const isTaken=taken.has(id);
                      const isPicked=picked?.seats.has(id);
                      let cls='bg-slate-200';
                      if(isTaken)cls='bg-slate-300/60';
                      if(!isTaken)cls='bg-emerald-200';
                      if(isPicked)cls='bg-brand-600 ring-2 ring-brand-300';
                      return <div key={id} title={`${id} · €${rowPrice(r)}`}
                        className={`w-5 h-5 rounded-[5px] ${cls} ${isPicked?'scale-110':''} transition-all`}/>;
                    })}
                    <span className="w-8 text-[10px] text-slate-400 text-right">€{rowPrice(r)}</span>
                  </div>
                ))}
              </div>
              <div className="flex items-center gap-4 justify-center mt-4 text-[11px] text-slate-500">
                <span className="flex items-center gap-1"><i className="w-3 h-3 rounded bg-emerald-200 inline-block"/>свободно</span>
                <span className="flex items-center gap-1"><i className="w-3 h-3 rounded bg-slate-300/60 inline-block"/>занято</span>
                <span className="flex items-center gap-1"><i className="w-3 h-3 rounded bg-brand-600 inline-block"/>подобрано</span>
              </div>
            </div>
          </div>

          {picked && picked.row && (
            <div className="fade mt-4 bg-white border border-brand-200 rounded-2xl p-4 flex flex-wrap items-center gap-3">
              <div>
                <div className="text-[13px] font-semibold">Ряд {picked.row}, места {[...picked.seats].map(s=>s.slice(1)).join(', ')}</div>
                <div className="text-[12px] text-slate-500">{n} мест рядом · €{picked.price} / место · итого €{picked.price*n}</div>
              </div>
              <button className="ml-auto text-[13px] font-semibold text-white bg-brand-600 hover:bg-brand-700 rounded-xl px-5 py-2">Забронировать эти</button>
            </div>
          )}
          {picked && !picked.row && (
            <div className="fade mt-4 bg-amber-50 border border-amber-200 text-amber-800 text-[13px] rounded-xl px-4 py-3">
              Не нашлось {n} мест рядом до €{maxP}. Попробуйте увеличить бюджет или уменьшить число мест.
            </div>
          )}
        </div>
      </StoreChrome>
    </div>
  );
}

function Stat({label,value,sub,accent}){
  return (
    <div className="bg-white border border-slate-200 rounded-2xl p-4">
      <div className="text-[12px] text-slate-400">{label}</div>
      <div className={`text-[24px] font-bold mt-1 ${accent||''}`}>{value}</div>
      {sub && <div className="text-[12px] text-slate-400 mt-0.5">{sub}</div>}
    </div>
  );
}
function Bar({label,val,max,tone='brand'}){
  const c={brand:'bg-brand-500',amber:'bg-amber-500',rose:'bg-rose-500'}[tone];
  return (
    <div className="flex items-center gap-3">
      <div className="w-40 text-[12px] text-slate-600 truncate">{label}</div>
      <div className="flex-1 h-2.5 bg-slate-100 rounded-full overflow-hidden"><div className={`h-full ${c} rounded-full`} style={{width:`${val/max*100}%`}}/></div>
      <div className="w-8 text-right text-[12px] font-medium text-slate-500">{val}</div>
    </div>
  );
}

   ============================================================ */

  const [out,setOut]=useState(null);

    announce:{label:'Анонс события',hint:'на 5 языках'},

      setBusy(false);

          'Deutsch':'Hans Zimmer Live in Berlin — 20. Juni, Mercedes-Benz Arena. Legendäre Filmmusik live: Interstellar, Dune, Fluch der Karibik. Tickets ab €45.',
          'Latviešu':'Hans Zimmer Live Berlīnē — 20. jūnijā, Mercedes-Benz Arena. Leģendārā filmu mūzika tiešraidē. Biļetes no €45.',
          'עברית':'הופעה חיה של האנס צימר בברלין — 20 ביוני, Mercedes-Benz Arena. פסקולים אגדיים בלייב. כרטיסים מ-€45.',
        }});
      } else if(task==='newsletter'){
        setOut({type:'text',data:'Тема: Билеты на Hans Zimmer Live уже в продаже 🎬\n\nДрузья, старт продаж! 20 июня в Mercedes-Benz Arena — саундтреки, которые вы знаете наизусть, вживую с оркестром.\n\nЛучшие места уходят первыми. Семейный блок 6+, билеты от €45.\n\n[Купить билет] · Берлин · 20 июня, 20:00'});
      } else {
        setOut({type:'segment',data:[
          {name:'Ходили на концерты за 12 мес',size:'4 210',why:'высокий отклик на музыку',rec:true},
          {name:'Покупали в Берлине',size:'7 880',why:'локальная аудитория события'},
          {name:'Семьи с детьми (6+)',size:'2 140',why:'подходит семейный блок'},
        ]});
      }
    },900);
  };

  return (
    <AdminChrome title="Campaign Assistant">
      <div className={`p-4 md:p-6 ${mobile?'':'grid grid-cols-2 gap-6'}`}>
        {/* ввод */}
        <div>
          <div className="text-[13px] font-semibold text-slate-700 mb-2">Что нужно сделать?</div>

              <button key={k} onClick={()=>{setTask(k);setOut(null);}}

                <span className="font-medium">{v.label}</span> <span className="text-slate-400">— {v.hint}</span>
              </button>
            ))}
          </div>

          <div className="bg-white border border-slate-200 rounded-xl p-3 mb-3">
            <div className="text-[12px] text-slate-400 mb-1">Событие</div>
            <div className="flex items-center gap-2">
              <div className={`w-9 h-9 rounded-lg bg-gradient-to-br ${GENRES[ev.genre].grad}`}/>

          </div>

          <textarea defaultValue="Тон — тёплый, без канцелярита. Подчеркни семейный блок и культовые саундтреки."

            className="text-[13px] font-semibold text-white bg-brand-600 hover:bg-brand-700 rounded-xl px-5 py-2.5 w-full disabled:opacity-60">
            {busy?'Генерирую…':'Сгенерировать'}

        </div>

        {/* результат */}
        <div className={mobile?'mt-5':''}>
          <div className="text-[13px] font-semibold text-slate-700 mb-2">Результат</div>
          {!out && !busy && <div className="text-[13px] text-slate-400 bg-white border border-dashed border-slate-200 rounded-xl p-8 text-center">Выберите задачу и нажмите «Сгенерировать»</div>}

            </div>

          {out?.type==='segment' && (
            <div className="fade space-y-2">
              {out.data.map(s=>(
                <div key={s.name} className={`bg-white border rounded-xl p-3 ${s.rec?'border-brand-300':'border-slate-200'}`}>

                    <div className="text-[13px] font-semibold">{s.name}</div>

            </div>
          )}
        </div>
      </div>
    </AdminChrome>
  );
}
function MultiLang({data}){
  const langs=Object.keys(data);
  const [a,setA]=useState(langs[0]);
  return (
    <div className="fade">
      <div className="flex gap-1.5 mb-2 flex-wrap">
        {langs.map(l=><button key={l} onClick={()=>setA(l)} className={`text-[12px] px-2.5 py-1 rounded-lg ${a===l?'bg-ink text-white':'bg-white border border-slate-200 text-slate-600'}`}>{l}</button>)}
      </div>
      <div className="bg-white border border-slate-200 rounded-xl p-4 text-[13px] text-slate-700" dir={a==='עברית'?'rtl':'ltr'}>{data[a]}</div>
      <div className="mt-2 flex gap-2"><button className="text-[12px] font-semibold text-white bg-brand-600 rounded-lg px-3 py-1.5">Опубликовать все 5</button><button className="text-[12px] border border-slate-200 rounded-lg px-3 py-1.5">Скопировать</button></div>
    </div>
  );
}
